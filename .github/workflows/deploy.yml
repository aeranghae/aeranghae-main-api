name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 6. 서버에서 애플리케이션 실행 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            echo "--- 서버 배포 스크립트 시작 ---"
            
            # 6-1. 기존 프로세스 종료
            # 세션 간섭을 피하기 위해 pkill을 사용하고, 에러를 무시하도록 처리합니다.
            echo "기존 프로세스 확인 및 종료 중..."
            (pkill -15 -f 'main-api' || true)
            sleep 5
            (pkill -9 -f 'main-api' || true)
            sleep 2
            
            # 6-2. 빌드 파편 정리
            rm -f ~/app/*-plain.jar
            
            # 6-3. 새로운 버전 실행
            echo "새로운 버전 실행 시도..."
            # 명시적으로 절대 경로를 사용하고, nohup 실행을 강화합니다.
            BUILD_JAR=$(ls /home/aeranghae/app/main-api-*.jar | head -n 1)
            nohup java -jar $BUILD_JAR \
              --spring.config.location=file:/home/aeranghae/app/application-prod.yml \
              > /home/aeranghae/app/app.log 2>&1 &
            
            # 6-4. 스프링 부트 초기화 대기
            echo "스프링 부트 초기화 대기 중 (15초)..."
            sleep 15
            
            # 6-5. 최종 실행 상태 확인
            # grep -v grep을 넣어 본인 확인 방지
            CURRENT_PID=$(pgrep -f 'main-api' || true)
            if [ -z "$CURRENT_PID" ]; then
              echo "--- [실패] 서버가 실행되지 않았습니다. 로그 마지막 부분을 출력합니다. ---"
              tail -n 30 /home/aeranghae/app/app.log
              exit 1
            else
              echo "--- [성공] 서버가 정상적으로 실행되었습니다! (PID: $CURRENT_PID) ---"
              exit 0
            fi