name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    # main 브랜치에 push 되었거나, PR이 성공적으로 Merge 되었을 때만 실행
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 6. 서버에서 애플리케이션 실행 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            # 6-1. 기존 프로세스 종료 (더 안전한 방식)
            echo "기존 프로세스 종료 중..."
            PID=$(pgrep -f 'main-api')
            if [ -n "$PID" ]; then
              kill -15 $PID
              sleep 5
              # 여전히 살아있다면 강제 종료
              kill -9 $PID 2>/dev/null || true
            fi
            
            # 6-2. 기존 파일 정리
            rm -f ~/app/*-plain.jar
            
            # 6-3. 애플리케이션 실행
            echo "새로운 버전 실행 중..."
            # nohup과 disown을 조합하여 SSH 세션 종료 후에도 프로세스를 유지합니다.
            nohup java -jar ~/app/main-api-*.jar \
              --spring.config.location=file:/home/aeranghae/app/application-prod.yml \
              > ~/app/app.log 2>&1 &
            
            # 잠시 대기 후 프로세스가 잘 떴는지 확인
            sleep 10
            if pgrep -f 'main-api' > /dev/null; then
              echo "서버가 성공적으로 실행되었습니다."
            else
              echo "서버 실행에 실패했습니다. 로그(~/app/app.log)를 확인하세요."
              exit 1
            fi