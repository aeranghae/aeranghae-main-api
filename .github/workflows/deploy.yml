name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    # main 브랜치에 push 되었거나, PR이 성공적으로 Merge 되었을 때만 실행
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 6. 서버에서 애플리케이션 실행 및 백업 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            echo "--- 서버 배포 및 백업 스크립트 시작 ---"
            
            # 6-1. 백업 폴더 생성
            mkdir -p ~/app/backup
            
            # 6-2. 기존 실행 중인 파일 백업 (파일명에 타임스탬프 추가)
            # backup 폴더에 들어있지 않은 기존 jar 파일을 찾아 백업합니다.
            EXISTING_JAR=$(ls ~/app/main-api-*.jar 2>/dev/null | grep -v "backup" | head -n 1)
            if [ -n "$EXISTING_JAR" ]; then
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              mv "$EXISTING_JAR" "~/app/backup/main-api-$TIMESTAMP.jar"
              echo "기존 파일을 백업했습니다: backup/main-api-$TIMESTAMP.jar"
            fi

            # 6-3. 기존 프로세스 확인 및 종료
            echo "기존 프로세스 확인 및 종료 중..."
            (pkill -15 -f 'main-api' || true)
            sleep 7
            (pkill -9 -f 'main-api' || true)
            
            # 6-4. 빌드 파편 정리 (-plain.jar 삭제)
            rm -f ~/app/*-plain.jar
            
            # 6-5. 새로운 버전 실행
            echo "새로운 버전 실행 시도..."
            # SCP로 방금 전송된 새로운 jar 파일을 찾아 실행합니다.
            NEW_JAR=$(ls ~/app/main-api-*.jar | head -n 1)
            
            if [ -z "$NEW_JAR" ]; then
              echo "실행할 JAR 파일을 찾을 수 없습니다."
              exit 1
            fi
            
            nohup java -jar $NEW_JAR \
              --spring.config.location=file:/home/aeranghae/app/application-prod.yml \
              > /home/aeranghae/app/app.log 2>&1 &
            
            # 6-6. 스프링 부트 초기화 대기 (15초)
            echo "스프링 부트 초기화 대기 중 (15초)..."
            sleep 15
            
            # 6-7. 최종 실행 상태 확인
            CURRENT_PID=$(pgrep -f 'main-api' || true)
            if [ -z "$CURRENT_PID" ]; then
              echo "--- [실패] 서버가 실행되지 않았습니다. 로그 마지막 부분을 출력합니다. ---"
              tail -n 30 /home/aeranghae/app/app.log
              exit 1
            else
              echo "--- [성공] 서버가 정상적으로 실행되었습니다! (PID: $CURRENT_PID) ---"
              exit 0
            fi