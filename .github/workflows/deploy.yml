name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    # main 브랜치에 push 되었거나, PR이 성공적으로 Merge 되었을 때만 실행
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 6. 서버에서 애플리케이션 실행 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            # 6-1. 기존에 실행 중인 서버 프로세스 종료
            PID=$(pgrep -f 'main-api')
            if [ -n "$PID" ]; then
              kill -15 $PID
              sleep 5
            fi
            
            # 6-2. 기존 plain.jar 파일이 남아있다면 삭제 (실행 오류 방지)
            rm -f ~/app/*-plain.jar
            
            # 6-3. 서버 내부 설정 파일을 적용하여 새로운 서버 실행
            # --spring.config.location 옵션으로 서버에 미리 만든 파일을 지정합니다.
            nohup java -jar ~/app/main-api-*.jar \
              --spring.config.location=file:/home/aeranghae/app/application.yml \
              > ~/app/app.log 2>&1 &