name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    # main 브랜치에 push 되었거나, PR이 성공적으로 Merge 되었을 때만 실행
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 6. 서버에서 애플리케이션 실행 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            echo "--- 서버 배포 스크립트 시작 ---"
            
            # 6-1. 기존 프로세스 확인 및 종료
            # || true를 붙여 프로세스가 없거나 종료 시 에러가 나도 스크립트가 중단되지 않게 합니다.
            echo "기존 프로세스 확인 중..."
            PID=$(pgrep -f 'main-api')
            if [ -n "$PID" ]; then
              echo "기존 프로세스(PID: $PID) 종료 시도 (SIGTERM)..."
              kill -15 $PID || true
              sleep 7
            
              # 여전히 살아있으면 강제 종료 (SIGKILL)
              if pgrep -f 'main-api' > /dev/null; then
                echo "강제 종료 시도 (SIGKILL)..."
                kill -9 $PID || true
                sleep 2
              fi
            else
              echo "종료할 기존 프로세스가 없습니다."
            fi
            
            # 6-2. 빌드 파편 정리
            rm -f ~/app/*-plain.jar
            
            # 6-3. 새로운 버전 실행
            # nohup 실행 결과를 로그 파일에 담고 백그라운드로 실행합니다.
            echo "새로운 버전 실행 시도..."
            nohup java -jar ~/app/main-api-*.jar \
              --spring.config.location=file:/home/aeranghae/app/application-prod.yml \
              > ~/app/app.log 2>&1 &
            
            # 6-4. 스프링 부트가 초기화될 시간을 충분히 줍니다.
            echo "스프링 부트 초기화 대기 중 (15초)..."
            sleep 15
            
            # 6-5. 최종 실행 상태 확인 및 로그 출력
            if pgrep -f 'main-api' > /dev/null; then
              echo "--- [성공] 서버가 정상적으로 실행되었습니다! ---"
              ps -ef | grep 'main-api' | grep -v grep
            else
              echo "--- [실패] 서버가 실행되지 않았습니다. 로그 마지막 부분을 출력합니다. ---"
              tail -n 30 ~/app/app.log
              exit 1
            fi