# .github/workflows/ci-pipeline.yml 파일 내용

# 이 워크플로우의 이름을 정의합니다. GitHub Actions UI에 표시됩니다.
name: Java CI/CD with Gradle and Docker

# 이 워크플로우를 언제 실행할지(트리거)를 정의합니다.
on:
  # main 브랜치에 푸시가 발생할 때 실행합니다.
  push:
    branches: [ "main" ]
  # main 브랜치로 Pull Request가 열리거나 업데이트될 때 실행합니다.
  pull_request:
    branches: [ "main" ]

# 워크플로우에서 수행할 작업(job)들을 정의합니다.
jobs:
  # 'build'라는 이름의 단일 작업(Job)을 정의합니다.
  build:
    # 워크플로우가 실행될 환경 (GitHub 호스팅 가상 머신).
    runs-on: ubuntu-latest

    # GITHUB_TOKEN이 GHCR에 푸시 및 Release를 생성할 수 있도록 권한을 설정합니다.
    permissions:
      # 코드를 읽을 수 있는 권한을 부여합니다.
      contents: write # 수정: Release 생성을 위해 'write' 권한이 필수입니다.
      # GHCR(Packages)에 이미지를 읽고 쓸 수 있는 권한을 부여합니다.
      packages: write

    # Job 내에서 순차적으로 실행될 단계(steps)들을 정의합니다.
    steps:
      - name: Checkout Repository # 1. 코드 체크아웃 단계
        # 'actions/checkout' 액션을 사용하여 레포지토리 코드를 가상 환경으로 가져옵니다.
        uses: actions/checkout@v4

      - name: Set up JDK 21 # 2. Java 개발 환경 설정 단계
        # 지정된 버전의 JDK를 설치하고 Gradle 캐싱을 설정합니다.
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Gradle 의존성 캐싱을 활성화하여 빌드 시간을 단축합니다.
          cache: 'gradle'

      - name: Grant Execute Permission to gradlew # 3. gradlew 실행 권한 부여
        # Linux/유닉스 환경에서 Gradle Wrapper 파일(gradlew)에 실행 권한을 부여합니다.
        run: chmod +x gradlew

      # -----------------------------------------------------
      # 💡 JAR 파일 생성 및 CI 테스트 실행 (Docker 빌드와 Release에 필요)
      # -----------------------------------------------------
      - name: Build with Gradle
        # 'bootJar' 태스크를 실행하여 실행 가능한 JAR 파일을 생성합니다.
        # '-x test'는 테스트 실행을 제외하고 JAR 파일 생성에만 집중합니다. (선택적)
        run: ./gradlew bootJar -x test

      # 💡 1. 레포지토리 이름을 소문자로 변환하여 환경 변수(REPO_LOWER)에 저장
      - name: Set Repository Name Lowercase
        # 셸 명령 'tr'을 사용하여 대문자를 소문자로 변환하고, 그 결과를 $GITHUB_ENV에 저장합니다.
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 💡 2. Docker Hub에 로그인 (Dockerfile의 FROM 이미지 접근 문제 해결)
      - name: Docker Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Docker Hub ID Secret을 사용합니다.
          username: ${{ secrets.DOCKER_USERNAME }}
          # Docker Hub PAT Secret을 사용합니다.
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- Docker Build/Push 단계 시작 ---

      - name: Set up Docker Buildx # Docker 빌드를 위한 환경 설정
        # Docker Buildx 환경을 설정하여 고급 빌드 기능을 활성화합니다.
        uses: docker/setup-buildx-action@v3

      # 💡 3. GHCR에 로그인 (가장 강력하고 안전한 GITHUB_TOKEN 사용)
      - name: Docker Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # GitHub 사용자 이름을 로그인 ID로 사용합니다.
          username: ${{ github.actor }}
          # GitHub가 자동으로 제공하는 임시 토큰(Secret)을 사용합니다.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image # Docker 이미지 빌드 및 푸시
        # Docker 빌드 및 푸시 액션을 사용하여 이미지를 GHCR로 전송합니다.
        uses: docker/build-push-action@v5
        with:
          context: . # Dockerfile이 있는 현재 디렉터리를 빌드 컨텍스트로 사용합니다.
          push: true # 빌드 후 GHCR로 푸시를 활성화합니다.
          # 소문자 환경 변수와 커밋 해시를 태그로 사용하여 GHCR에 이미지를 푸시합니다.
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest,ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
          # GitHub Actions 캐싱을 활용하여 빌드 시간을 단축합니다.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Docker Build/Push 단계 종료 ---

      # -----------------------------------------------------
      # 💡 Release 생성 및 JAR 파일 첨부 단계
      # -----------------------------------------------------
      - name: Get JAR Filename # 1. 생성된 JAR 파일의 이름을 동적으로 가져옵니다.
        id: get_filename
        # 'ls' 명령으로 파일 이름을 찾고, 'basename'으로 경로를 제거한 후 출력 변수에 저장합니다.
        run: echo "JAR_NAME=$(ls build/libs/*.jar | xargs basename)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release # 2. Release를 생성하고 JAR 파일을 첨부합니다.
        # 'softprops/action-gh-release' 액션을 사용하여 Release 작업을 수행합니다.
        uses: softprops/action-gh-release@v2
        # Git 태그 푸시 이벤트에만 이 단계가 실행되도록 조건을 설정합니다.
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 첨부할 JAR 파일의 정확한 경로를 동적으로 지정합니다.
          files: ${{ github.workspace }}/build/libs/${{ steps.get_filename.outputs.JAR_NAME }}
          # Release 이름을 Git 태그 이름으로 설정합니다.
          name: Release ${{ github.ref_name }}
          body: 'Automated release of new build.'
          draft: false # 임시 Release가 아닌 정식 Release로 생성합니다.
          prerelease: false # 프리릴리즈로 생성하지 않습니다.

      - name: Upload Test Results # CI 테스트 결과 아티팩트 저장 (기존 단계)
        # 테스트 보고서 결과 파일들을 GitHub Actions의 아티팩트로 저장합니다.
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests
          if-no-files-found: ignore # 테스트 보고서가 없어도 오류를 발생시키지 않습니다.