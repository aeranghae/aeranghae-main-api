# .github/workflows/ci-pipeline.yml 파일 수정

name: Java CI/CD with Gradle and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 이미지 푸시를 위해 이 작업(job)에서 secrets 사용을 허용
    permissions:
      contents: read
      packages: write # GHCR에 푸시하기 위해 'packages: write' 권한이 필수입니다.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      # --- Docker Build/Push 단계 시작 ---

      - name: Set up Docker Buildx # Docker 빌드를 위한 환경 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Login to GHCR # GHCR(GitHub Container Registry)에 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image # Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: . # Dockerfile이 있는 디렉터리
          push: true # GHCR로 푸시 활성화
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }} # 커밋 해시 태그도 함께 푸시
          cache-from: type=gha # GitHub Actions 캐싱을 활용하여 빌드 속도 향상
          cache-to: type=gha,mode=max

      # --- Docker Build/Push 단계 종료 ---

      - name: Upload Test Results # CI 테스트 결과 아티팩트 저장 (기존 단계)
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests
          if-no-files-found: ignore