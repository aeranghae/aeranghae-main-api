# .github/workflows/ci-pipeline.yml 파일 내용

name: Java CI/CD with Gradle and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # GITHUB_TOKEN이 GHCR에 푸시할 수 있도록 권한 부여
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      # 💡 1. 레포지토리 이름을 소문자로 변환하여 환경 변수(REPO_LOWER)에 저장
      - name: Set Repository Name Lowercase
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 💡 2. Docker Hub에 로그인 (FROM 이미지 접근 문제 해결)
      - name: Docker Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }} # Docker Hub ID Secret 사용
          password: ${{ secrets.DOCKER_HUB_PASSWORD }} # Docker Hub PAT Secret 사용

      # --- Docker Build/Push 단계 시작 ---

      - name: Set up Docker Buildx # Docker 빌드를 위한 환경 설정
        uses: docker/setup-buildx-action@v3

      # 💡 3. GHCR에 로그인 (가장 강력하고 안전한 GITHUB_TOKEN 사용)
      - name: Docker Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub가 제공하는 임시 토큰 사용

      - name: Build and Push Docker Image # Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 💡 소문자 환경 변수 REPO_LOWER와 쉼표(,) 구분자를 사용하여 태그 생성
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest,ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Docker Build/Push 단계 종료 ---

      - name: Upload Test Results # CI 테스트 결과 아티팩트 저장
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests
          if-no-files-found: ignore