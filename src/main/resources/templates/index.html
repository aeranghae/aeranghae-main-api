<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>애랑해(AI-ranghae) 서비스</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<h1>애랑해 서비스 메인</h1>
<hr>

<div th:if="${userName == null}">
    <p>서비스를 이용하려면 로그인이 필요합니다.</p>
    <a href="/oauth2/authorization/google" role="button">Google Login</a>
</div>

<div th:if="${userName != null}">
    <p>안녕하세요, <span th:text="${userName}"></span>님!</p>

    <div th:if="${userRole == 'ROLE_GUEST'}" style="background-color: #f9f9f9; padding: 20px; margin: 20px 0; border: 1px solid #ccc;">
        <h3>🚀 정식 이용을 위해 가입을 완료해 주세요!</h3>
        <label>닉네임: <input type="text" id="nickname" placeholder="서비스에서 사용할 닉네임"></label>
        <br><br>
        <label><input type="checkbox" id="agreeTerms"> (필수) 애랑해 서비스 이용약관에 동의합니다.</label>
        <br><br>
        <button type="button" onclick="completeSignup()">정식 가입 완료</button>
    </div>

    <div th:if="${userRole == 'ROLE_USER'}" style="margin: 20px 0;">
        <h3>✅ 정식 회원 전용 메뉴</h3>
        <a href="/api/projects" role="button" style="display:inline-block; padding:10px; background-color:blue; color:white; text-decoration:none;">프로젝트 관리 가기</a>
    </div>

    <br>
    <a href="/logout" role="button" style="color: red;">Logout</a>
</div>

<script>
    function completeSignup() {
        var nickname = $('#nickname').val();
        var agreeTerms = $('#agreeTerms').is(':checked');

        if (!nickname.trim()) {
            alert('닉네임을 입력해주세요.');
            return;
        }
        if (!agreeTerms) {
            alert('이용약관에 동의해야 가입할 수 있습니다.');
            return;
        }

        $.ajax({
            type: 'POST',
            url: '/api/user/signup',
            contentType: 'application/json; charset=utf-8',
            data: JSON.stringify({nickname: nickname})
        }).done(function() {
            // 스프링 시큐리티의 세션(권한)을 안전하게 갱신하기 위해 로그아웃 후 재로그인 유도
            alert('정식 회원가입이 완료되었습니다! 닉네임과 권한 적용을 위해 다시 로그인해주세요.');
            window.location.href = '/logout';
        }).fail(function(error) {
            alert('가입 처리 중 오류가 발생했습니다.');
        });
    }
</script>
</body>
</html>
